name: Investment Engine

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

permissions:
  contents: write
  issues: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh workbook
        env:
          FINVIZ: ${{ secrets.FINVIZ }}
        run: python investment-engine/engine/data_engine.py

      - name: Commit workbook changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add investment-engine/Ticker-Master.json investment-engine
          git diff --cached --quiet || git commit -m "chore: refresh investment engine outputs"
          git push

      - name: Ensure investment-review label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "investment-review" \
            --description "Weekly Investment Engine Phase 2 trigger" \
            --color "0075ca" \
            2>/dev/null || true

      - name: Create Phase 2 trigger issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%m%d%Y)
          DISPLAY_DATE=$(date +"%B %d, %Y")
          gh issue create \
            --title "Investment Engine — Phase 1 Complete [$DISPLAY_DATE]" \
            --label "investment-review" \
            --body "## Phase 1 is done. Phase 2 is ready to run.

          **Date:** $DISPLAY_DATE

          ### Files committed this run
          - \`investment-engine/stock-data/investment_data_$DATE.xlsx\` — scored workbook
          - \`investment-engine/stock-data/consolidated_$DATE.csv\` — Investment Master + Speculative combined
          - \`investment-engine/ticker-review/watchlist_$DATE.json\` — watchlist classification (WL1–WL4)

          ### To run Phase 2
          1. Open the **Investment Engine** project in Claude.ai
          2. Say: **run the investment review for $DISPLAY_DATE**
          3. Claude will:
             - Confirm data received
             - Check existing Robinhood watchlists for duplicates
             - Add qualifying tickers to WL1–WL4 via Robinhood MCP
             - Send a completion summary
             - Research additional High Conviction candidates
             - Deliver research results as a downloadable file

          Close this issue once Phase 2 is complete."
